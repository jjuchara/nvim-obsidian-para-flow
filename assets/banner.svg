<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">obsidian-para-flow.nvim</title>
  <desc id="desc">A keyboard-first Obsidian Inbox and PARA workflow for Neovim</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.52" stop-color="#17132d"/>
      <stop offset="1" stop-color="#081b1b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#background)"/>
  <circle cx="160" cy="75" r="125" fill="#7c3aed" opacity=".18" filter="url(#glow)"/>
  <circle cx="1060" cy="315" r="150" fill="#22c55e" opacity=".13" filter="url(#glow)"/>
  <path d="M0 310 C260 235 420 390 660 300 S1010 250 1200 302" fill="none" stroke="url(#accent)" stroke-width="2" opacity=".32"/>
  <g transform="translate(96 98)">
    <rect x="0" y="0" width="112" height="112" rx="26" fill="#14162a" stroke="#8b5cf6" stroke-width="3"/>
    <path d="M56 25 86 56 56 87 26 56Z" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linejoin="round"/>
    <circle cx="56" cy="56" r="7" fill="#f8fafc"/>
    <path d="M56 49V37M63 56H75M56 63V75M49 56H37" fill="none" stroke="#c4b5fd" stroke-width="4" stroke-linecap="round"/>
  </g>
  <text x="244" y="152" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="54" font-weight="700">obsidian-para-flow.nvim</text>
  <rect x="246" y="177" width="820" height="4" rx="2" fill="url(#accent)"/>
  <text x="246" y="228" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24">Your inbox. Your vault. One PARA flow.</text>
  <g fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">
    <text x="246" y="276">FIFO REVIEW</text>
    <text x="405" y="276">SAFE MOVES</text>
    <text x="557" y="276">ZERO DEPS</text>
    <text x="693" y="276">PURE LUA</text>
